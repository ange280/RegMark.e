<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogoMart CI</title>
<style>
body{
font-family:Arial, sans-serif;
margin:0;
background:#0f172a;
color:white;
}

header{
text-align:center;
padding:40px 20px;
background:linear-gradient(135deg,#2563eb,#7c3aed);
}

header h1{
margin:0;
font-size:32px;
}

header p{
opacity:0.9;
}

.container{
max-width:1100px;
margin:auto;
padding:30px 20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
}

.card{
background:#1e293b;
border-radius:14px;
padding:15px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,0.4);
transition:transform .2s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
border-radius:10px;
background:white;
}

.price{
margin:10px 0;
font-weight:bold;
font-size:18px;
color:#22c55e;
}

button{
background:#25D366;
border:none;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:0.9;
}

footer{
text-align:center;
padding:25px;
opacity:0.7;
}
</style>
</head>

<body>

<header>
<h1>LogoMart CI</h1>
<p>Logos professionnels pour startups et entreprises</p>
</header>

<div class="container">
<div class="grid" id="logoGrid"></div>
</div>

<footer>
Paiement via Wave ou MTN MoMo • Contact WhatsApp
</footer>

<script>
const phone = "2250584161702";

fetch("logos.json")
.then(res => res.json())
.then(data => {
const grid = document.getElementById("logoGrid");

data.forEach(logo => {
const card = document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${logo.image}" alt="${logo.name}">
<h3>${logo.name}</h3>
<div class="price">${logo.price} FCFA</div>
<button onclick="buyLogo('${logo.name}','${logo.price}')">Acheter</button>
`;

grid.appendChild(card);
});
});

function buyLogo(name,price){
const msg=`Bonjour, je souhaite acheter le logo ${name} à ${price} FCFA sur votre site LogoMart.`;
const url=`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
window.open(url,"_blank");
}
</script>

</body>
</html>
